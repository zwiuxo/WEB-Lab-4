version: "3.9"
services:
  web:
    image: nginx:1.27-alpine
    container_name: lab4_nginx
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - php

  php:
    image: php:8.2-fpm
    container_name: lab4_php
    volumes:
      - ./www:/var/www/html
    expose:
      - "9000"
